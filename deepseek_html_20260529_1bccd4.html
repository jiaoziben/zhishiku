<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ERP知识库 · 增强筛选版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4361ee;
            --primary-light: #eef2ff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-900: #111827;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-lg: 0.75rem;
            --radius-md: 0.5rem;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray-100);
            color: var(--gray-900);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }

        .logo-area {
            padding: 1.5rem 1.25rem;
            border-bottom: 1px solid var(--gray-200);
        }

        .logo {
            font-size: 1.35rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-item {
            padding: 0.6rem 1.25rem;
            margin: 0.2rem 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--gray-700);
        }

        .nav-item:hover {
            background: var(--gray-100);
            color: var(--primary);
        }

        .nav-item.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 筛选栏区域 */
        .filter-bar {
            background: white;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 1rem;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            min-width: 120px;
        }

        .filter-group label {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--gray-500);
            text-transform: uppercase;
        }

        .filter-input, .filter-select {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--gray-200);
            border-radius: 0.5rem;
            font-size: 0.85rem;
            background: var(--gray-50);
            transition: 0.2s;
            width: 150px;
        }

        .filter-input:focus, .filter-select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }

        .date-range {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .date-range .filter-input {
            width: 120px;
        }

        .filter-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .btn-clear {
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-clear:hover {
            background: var(--gray-200);
        }

        .top-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.6rem 1.25rem;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.2s;
        }

        .btn-primary:hover {
            background: #334bcb;
            transform: translateY(-1px);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .stats-grid {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .stat-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1rem 1.5rem;
            flex: 1;
            min-width: 140px;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-light);
            border-radius: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
        }

        .stat-info h3 {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .qa-list, .tag-group-list {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--gray-200);
            overflow: hidden;
        }

        .tag-section {
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--gray-200);
        }
        .tag-section:last-child {
            border-bottom: none;
        }
        .tag-header {
            background: var(--gray-50);
            padding: 0.75rem 1.25rem;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-left: 4px solid var(--primary);
        }
        .tag-badge {
            background: var(--primary-light);
            color: var(--primary);
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.75rem;
        }
        .qa-item {
            padding: 1.25rem;
            border-bottom: 1px solid var(--gray-100);
            transition: 0.15s;
        }
        .qa-item:last-child {
            border-bottom: none;
        }
        .qa-item:hover {
            background: var(--gray-50);
        }
        .qa-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .qa-question {
            font-weight: 600;
            font-size: 1rem;
            color: var(--gray-900);
            word-break: break-word;
        }
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .tag {
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            background: var(--gray-100);
            color: var(--gray-700);
        }
        .tag-sales { background: #fef3c7; color: #b45309; }
        .tag-marketing { background: #fee2e2; color: #b91c1c; }
        .tag-service { background: #dbeafe; color: #1e40af; }
        .tag-general { background: #e5e7eb; color: #374151; }
        .tag-ai { background: #e0e7ff; color: #3730a3; }
        .tag-manual { background: #d1fae5; color: #065f46; }
        .custom-tag {
            background: #ede9fe;
            color: #5b21b6;
        }
        .product-tag {
            background: #fed7aa;
            color: #9a3412;
        }
        .qa-answer {
            background: var(--gray-50);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            margin: 0.75rem 0;
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--gray-700);
            border-left: 3px solid var(--primary);
        }
        .qa-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: var(--gray-500);
        }
        .action-btns {
            display: flex;
            gap: 0.75rem;
        }
        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--gray-500);
            transition: 0.1s;
        }
        .action-btn.edit:hover { color: var(--primary); }
        .action-btn.delete:hover { color: var(--danger); }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(2px);
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 560px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body { padding: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(67, 97, 238, 0.1);
        }
        .row-2cols {
            display: flex;
            gap: 1rem;
        }
        .row-2cols .form-group { flex: 1; }
        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--gray-200);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding: 1rem 0;
        }
        .page-btn {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--gray-200);
            background: white;
            border-radius: 0.5rem;
            cursor: pointer;
        }
        .page-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gray-900);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            z-index: 1100;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }
        .highlight {
            background-color: #fef08a;
            border-radius: 0.2rem;
            padding: 0 0.1rem;
        }
        .info-tip {
            background: #e0e7ff;
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
            color: #1e40af;
            margin-left: 0.5rem;
        }

        @media (max-width: 860px) {
            .filter-bar { flex-direction: column; align-items: stretch; }
            .filter-group { width: 100%; }
            .filter-input, .filter-select, .date-range .filter-input { width: 100%; }
            .date-range { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="logo-area">
            <div class="logo">📘 智答知识库</div>
        </div>
        <!-- 简化的菜单：无分组标题，直接平铺 -->
        <div class="nav-item active" data-type="biz" data-value="all"><span>🏠</span> <span>知识总览</span></div>
        <div class="nav-item" data-type="biz" data-value="sales"><span>💰</span> <span>销售专区</span></div>
        <div class="nav-item" data-type="biz" data-value="marketing"><span>📣</span> <span>营销专区</span></div>
        <div class="nav-item" data-type="biz" data-value="service"><span>🛡️</span> <span>售后专区</span></div>
        <div class="nav-item" data-type="biz" data-value="general"><span>📝</span> <span>通用常识</span></div>
    </aside>

    <main class="main">
        <!-- 多维度筛选栏 -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>📦 商品</label>
                <input type="text" id="filterProduct" class="filter-input" placeholder="商品名称">
            </div>
            <div class="filter-group">
                <label>❓ 问题</label>
                <input type="text" id="filterQuestion" class="filter-input" placeholder="问题关键词">
            </div>
            <div class="filter-group">
                <label>💡 答案</label>
                <input type="text" id="filterAnswer" class="filter-input" placeholder="答案关键词">
            </div>
            <div class="filter-group">
                <label>🏷️ 标签</label>
                <input type="text" id="filterTag" class="filter-input" placeholder="营销标签">
            </div>
            <div class="filter-group">
                <label>✍️ 创建人</label>
                <input type="text" id="filterAuthor" class="filter-input" placeholder="作者">
            </div>
            <div class="filter-group">
                <label>📅 时间范围</label>
                <div class="date-range">
                    <input type="date" id="filterDateFrom" class="filter-input" placeholder="起始日期">
                    <span>—</span>
                    <input type="date" id="filterDateTo" class="filter-input" placeholder="结束日期">
                </div>
            </div>
            <div class="filter-actions">
                <button id="clearFiltersBtn" class="btn-clear">重置筛选</button>
            </div>
            <div class="top-actions" style="margin-left: auto;">
                <button class="btn-primary" id="createBtn">➕ 新建问答</button>
            </div>
        </div>

        <div class="content">
            <div class="stats-grid" id="statsGrid"></div>
            <div id="listContainer"></div>
            <div id="pagination" class="pagination"></div>
        </div>
    </main>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">新建问答</h3>
            <button class="action-btn" id="closeModalBtn" style="font-size: 1.5rem;">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editId" value="">
            <div class="form-group">
                <label class="form-label">问题 *</label>
                <input type="text" id="questionInput" class="form-input" placeholder="客户常问的问题">
            </div>
            <div class="form-group">
                <label class="form-label">标准答案 *</label>
                <textarea id="answerInput" class="form-textarea" rows="3" placeholder="回复话术/解决方案"></textarea>
            </div>
            <div class="row-2cols">
                <div class="form-group">
                    <label class="form-label">知识分类</label>
                    <select id="categorySelect" class="form-select">
                        <option value="common">常识知识</option>
                        <option value="operation">操作指南</option>
                        <option value="special">特殊/异常问题</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">业务类型 *</label>
                    <select id="bizTypeSelect" class="form-select">
                        <option value="sales">销售类型</option>
                        <option value="marketing">营销类型</option>
                        <option value="service">售后类型</option>
                        <option value="general">通用类型</option>
                    </select>
                </div>
            </div>
            <div class="form-group" id="productsGroup" style="display: none;">
                <label class="form-label">📦 关联商品 <span class="info-tip">多个商品用逗号隔开</span></label>
                <input type="text" id="productsInput" class="form-input" placeholder="例如：iPhone 15 Pro, MacBook Air">
                <div style="font-size: 0.7rem; color: #6b7280; margin-top: 0.25rem;">销售专区内问答必须指定商品</div>
            </div>
            <div class="form-group" id="tagsGroup" style="display: none;">
                <label class="form-label">🏷️ 营销标签 <span class="info-tip">多个标签用逗号隔开</span></label>
                <input type="text" id="tagsInput" class="form-input" placeholder="例如：双十一,满减,新品促销">
                <div style="font-size: 0.7rem; color: #6b7280; margin-top: 0.25rem;">营销专区内将按这些标签分组展示</div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-outline" id="cancelModalBtn">取消</button>
            <button class="btn-primary" id="saveBtn">保存</button>
        </div>
    </div>
</div>
<div id="toastMessage" class="toast"></div>

<script>
    // ---------- 数据模型 ----------
    let knowledgeBase = [];
    let nextId = 1;
    let currentBiz = 'all';
    let currentPage = 1;
    const PAGE_SIZE = 5;

    // 筛选条件值
    let filterProduct = '';
    let filterQuestion = '';
    let filterAnswer = '';
    let filterTag = '';
    let filterAuthor = '';
    let filterDateFrom = '';
    let filterDateTo = '';

    // 辅助函数
    function parseCommaList(str) {
        if (!str) return [];
        return str.split(/[ ,;，；]+/).map(t => t.trim()).filter(t => t !== "");
    }
    function arrayToCommaString(arr) {
        return arr.join(', ');
    }

    function ensureExtraFields() {
        knowledgeBase.forEach(item => {
            if (item.tags === undefined) item.tags = (item.bizType === 'marketing') ? ['通用'] : [];
            if (item.products === undefined) item.products = (item.bizType === 'sales') ? ['通用商品'] : [];
        });
        saveToLocal();
    }

    const defaultData = [
        { id: 1, q: '这款产品现在有折扣吗？', a: '目前正值促销季，满500减50，可叠加会员折扣。', source: 'ai', category: 'common', bizType: 'sales', time: '2025-02-18', author: 'AI引擎', tags: [], products: ['iPhone 15 Pro', 'MacBook Air'] },
        { id: 2, q: '双十一满减活动怎么计算？', a: '跨店满减每满300减50，店铺优惠券可叠加，上限不封顶。', source: 'manual', category: 'special', bizType: 'marketing', time: '2025-02-15', author: '客服李', tags: ['双十一', '满减', '大促'], products: [] },
        { id: 3, q: '如何开具电子发票？', a: '登录ERP → 订单管理 → 发票管理 → 新增申请，填写邮箱即可推送。', source: 'manual', category: 'operation', bizType: 'service', time: '2025-02-10', author: '王主管', tags: [], products: [] },
        { id: 4, q: '退款多久到账？', a: '微信/支付宝1-3个工作日，银行卡3-7个工作日，请耐心等待。', source: 'ai', category: 'common', bizType: 'general', time: '2025-02-20', author: 'AI分析', tags: [], products: [] },
        { id: 5, q: '会员积分怎么使用？', a: '下单时勾选积分抵扣，100积分=1元，单笔最多抵50%。', source: 'manual', category: 'common', bizType: 'sales', time: '2025-02-19', author: '客服张', tags: [], products: ['积分商城', '全品类'] },
        { id: 6, q: '新品首发优惠券领取方式', a: '关注公众号回复「新品」即可领取20元无门槛券。', source: 'manual', category: 'common', bizType: 'marketing', time: '2025-02-21', author: '市场部', tags: ['新品', '优惠券', '拉新'], products: [] }
    ];

    function loadData() {
        const stored = localStorage.getItem('erp_knowledge_advanced');
        if (stored) {
            knowledgeBase = JSON.parse(stored);
            ensureExtraFields();
            nextId = Math.max(...knowledgeBase.map(k => k.id), 0) + 1;
        } else {
            knowledgeBase = JSON.parse(JSON.stringify(defaultData));
            ensureExtraFields();
            nextId = 7;
            saveToLocal();
        }
    }
    function saveToLocal() {
        localStorage.setItem('erp_knowledge_advanced', JSON.stringify(knowledgeBase));
    }

    function getToday() { return new Date().toISOString().slice(0, 10); }

    function addOrUpdate(itemData) {
        const { id, q, a, category, bizType, tagsArray, productsArray } = itemData;
        if (id) {
            const idx = knowledgeBase.findIndex(i => i.id === id);
            if (idx !== -1) {
                knowledgeBase[idx] = { 
                    ...knowledgeBase[idx], 
                    q, a, category, bizType, 
                    time: getToday(), 
                    author: knowledgeBase[idx].source === 'ai' ? 'AI引擎' : '人工编辑',
                    tags: (bizType === 'marketing') ? tagsArray : (knowledgeBase[idx].tags || []),
                    products: (bizType === 'sales') ? productsArray : (knowledgeBase[idx].products || [])
                };
            }
        } else {
            const newItem = {
                id: nextId++,
                q, a,
                source: 'manual',
                category,
                bizType,
                time: getToday(),
                author: '客服创建',
                tags: (bizType === 'marketing') ? tagsArray : [],
                products: (bizType === 'sales') ? productsArray : []
            };
            knowledgeBase.unshift(newItem);
        }
        saveToLocal();
        renderAll();
        showToast(id ? '修改成功' : '新建成功');
    }

    function deleteItemById(id) {
        knowledgeBase = knowledgeBase.filter(item => item.id !== id);
        saveToLocal();
        if (knowledgeBase.length === 0 && currentPage > 1) currentPage = 1;
        renderAll();
        showToast('已删除');
    }

    // 复合筛选逻辑
    function getFilteredItems() {
        let filtered = [...knowledgeBase];
        // 业务板块
        if (currentBiz !== 'all') filtered = filtered.filter(item => item.bizType === currentBiz);

        // 商品筛选（在产品的数组里匹配）
        if (filterProduct.trim() !== '') {
            const kw = filterProduct.trim().toLowerCase();
            filtered = filtered.filter(item => item.products && item.products.some(p => p.toLowerCase().includes(kw)));
        }
        // 问题
        if (filterQuestion.trim() !== '') {
            const kw = filterQuestion.trim().toLowerCase();
            filtered = filtered.filter(item => item.q.toLowerCase().includes(kw));
        }
        // 答案
        if (filterAnswer.trim() !== '') {
            const kw = filterAnswer.trim().toLowerCase();
            filtered = filtered.filter(item => item.a.toLowerCase().includes(kw));
        }
        // 标签（营销标签）
        if (filterTag.trim() !== '') {
            const kw = filterTag.trim().toLowerCase();
            filtered = filtered.filter(item => item.tags && item.tags.some(t => t.toLowerCase().includes(kw)));
        }
        // 创建人
        if (filterAuthor.trim() !== '') {
            const kw = filterAuthor.trim().toLowerCase();
            filtered = filtered.filter(item => item.author.toLowerCase().includes(kw));
        }
        // 时间范围
        if (filterDateFrom !== '') {
            filtered = filtered.filter(item => item.time >= filterDateFrom);
        }
        if (filterDateTo !== '') {
            filtered = filtered.filter(item => item.time <= filterDateTo);
        }

        return filtered;
    }

    function highlightText(text, keyword) {
        if (!keyword.trim()) return text;
        const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(regex, `<mark class="highlight">$1</mark>`);
    }

    function renderStandardList() {
        const filtered = getFilteredItems();
        const total = filtered.length;
        const totalPages = Math.ceil(total / PAGE_SIZE);
        if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;
        const paginated = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
        const container = document.getElementById('listContainer');
        if (paginated.length === 0) {
            container.innerHTML = `<div style="text-align:center;padding:3rem;color:#9ca3af;">✨ 暂无匹配数据，请调整筛选条件</div>`;
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        let html = `<div class="qa-list">`;
        paginated.forEach(item => {
            const bizMap = { sales:'销售', marketing:'营销', service:'售后', general:'通用' };
            const bizTagClass = `tag-${item.bizType}`;
            const sourceTagClass = item.source === 'ai' ? 'tag-ai' : 'tag-manual';
            const sourceText = item.source === 'ai' ? 'AI采集' : '手动创建';
            const catMap = { common:'常识', operation:'操作指南', special:'异常问题' };
            let highlightedQ = item.q, highlightedA = item.a;
            if (filterQuestion) highlightedQ = highlightText(item.q, filterQuestion);
            if (filterAnswer) highlightedA = highlightText(item.a, filterAnswer);
            let productHtml = '';
            if (item.bizType === 'sales' && item.products && item.products.length) {
                const productTags = item.products.map(p => `<span class="tag product-tag">📦 ${p}</span>`).join('');
                productHtml = `<div class="tag-group" style="margin-top: 4px;">${productTags}</div>`;
            }
            html += `
                <div class="qa-item">
                    <div class="qa-header">
                        <div class="qa-question">❓ ${highlightedQ}</div>
                        <div class="tag-group">
                            <span class="tag ${bizTagClass}">${bizMap[item.bizType]}</span>
                            <span class="tag ${sourceTagClass}">${sourceText}</span>
                            <span class="tag">${catMap[item.category]}</span>
                        </div>
                    </div>
                    ${productHtml}
                    <div class="qa-answer">💡 ${highlightedA}</div>
                    <div class="qa-meta">
                        <span>📅 ${item.time} ｜ ✍️ ${item.author}</span>
                        <div class="action-btns">
                            <button class="action-btn edit" data-id="${item.id}">✏️ 编辑</button>
                            <button class="action-btn delete" data-id="${item.id}">🗑️ 删除</button>
                        </div>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
        attachItemEvents();

        let paginationHtml = `<button class="page-btn" data-page="prev" ${currentPage === 1 ? 'disabled style="opacity:0.5"' : ''}>上一页</button>`;
        for (let i = 1; i <= totalPages; i++) {
            paginationHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
        }
        paginationHtml += `<button class="page-btn" data-page="next" ${currentPage === totalPages ? 'disabled style="opacity:0.5"' : ''}>下一页</button>`;
        document.getElementById('pagination').innerHTML = paginationHtml;
        document.querySelectorAll('.page-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const page = btn.dataset.page;
                if (page === 'prev' && currentPage > 1) currentPage--;
                else if (page === 'next' && currentPage < totalPages) currentPage++;
                else if (!isNaN(parseInt(page))) currentPage = parseInt(page);
                renderAll();
            });
        });
    }

    function renderMarketingGrouped() {
        let filtered = getFilteredItems();
        filtered = filtered.filter(item => item.bizType === 'marketing');
        if (filtered.length === 0) {
            document.getElementById('listContainer').innerHTML = `<div style="text-align:center;padding:3rem;color:#9ca3af;">📭 暂无营销问答，请调整筛选条件</div>`;
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        const tagMap = new Map();
        filtered.forEach(item => {
            const tags = item.tags && item.tags.length ? item.tags : ['未分类'];
            tags.forEach(tag => {
                if (!tagMap.has(tag)) tagMap.set(tag, []);
                tagMap.get(tag).push(item);
            });
        });
        const sortedTags = Array.from(tagMap.keys()).sort((a,b) => a.localeCompare(b));
        let html = `<div class="tag-group-list">`;
        for (let tag of sortedTags) {
            const items = tagMap.get(tag);
            html += `<div class="tag-section">
                        <div class="tag-header">
                            🏷️ ${tag} 
                            <span class="tag-badge">${items.length}条内容</span>
                        </div>`;
            items.forEach(item => {
                let highlightedQ = item.q, highlightedA = item.a;
                if (filterQuestion) highlightedQ = highlightText(item.q, filterQuestion);
                if (filterAnswer) highlightedA = highlightText(item.a, filterAnswer);
                const sourceTagClass = item.source === 'ai' ? 'tag-ai' : 'tag-manual';
                const sourceText = item.source === 'ai' ? 'AI采集' : '手动创建';
                const catMap = { common:'常识', operation:'操作指南', special:'异常问题' };
                const customTagsHtml = item.tags && item.tags.length ? 
                    item.tags.map(t => `<span class="tag custom-tag">#${t}</span>`).join('') : '';
                html += `<div class="qa-item">
                            <div class="qa-header">
                                <div class="qa-question">❓ ${highlightedQ}</div>
                                <div class="tag-group">
                                    <span class="tag ${sourceTagClass}">${sourceText}</span>
                                    <span class="tag">${catMap[item.category]}</span>
                                    ${customTagsHtml}
                                </div>
                            </div>
                            <div class="qa-answer">💡 ${highlightedA}</div>
                            <div class="qa-meta">
                                <span>📅 ${item.time} ｜ ✍️ ${item.author}</span>
                                <div class="action-btns">
                                    <button class="action-btn edit" data-id="${item.id}">✏️ 编辑</button>
                                    <button class="action-btn delete" data-id="${item.id}">🗑️ 删除</button>
                                </div>
                            </div>
                        </div>`;
            });
            html += `</div>`;
        }
        html += `</div>`;
        document.getElementById('listContainer').innerHTML = html;
        document.getElementById('pagination').innerHTML = '';
        attachItemEvents();
    }

    function attachItemEvents() {
        document.querySelectorAll('.edit').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                openEditModal(id);
            });
        });
        document.querySelectorAll('.delete').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                if (confirm('删除后无法恢复，确定删除吗？')) deleteItemById(id);
            });
        });
    }

    function renderStats() {
        const aiCount = knowledgeBase.filter(i => i.source === 'ai').length;
        const manualCount = knowledgeBase.filter(i => i.source === 'manual').length;
        const total = knowledgeBase.length;
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="stat-icon">🤖</div><div class="stat-info"><h3>${aiCount}</h3><div>AI采集</div></div></div>
            <div class="stat-card"><div class="stat-icon">✍️</div><div class="stat-info"><h3>${manualCount}</h3><div>手动创建</div></div></div>
            <div class="stat-card"><div class="stat-icon">📚</div><div class="stat-info"><h3>${total}</h3><div>总知识数</div></div></div>
        `;
    }

    function renderAll() {
        renderStats();
        if (currentBiz === 'marketing') {
            renderMarketingGrouped();
        } else {
            renderStandardList();
        }
    }

    // 筛选值同步
    function syncFilters() {
        filterProduct = document.getElementById('filterProduct').value;
        filterQuestion = document.getElementById('filterQuestion').value;
        filterAnswer = document.getElementById('filterAnswer').value;
        filterTag = document.getElementById('filterTag').value;
        filterAuthor = document.getElementById('filterAuthor').value;
        filterDateFrom = document.getElementById('filterDateFrom').value;
        filterDateTo = document.getElementById('filterDateTo').value;
        currentPage = 1;
        renderAll();
    }

    function resetFilters() {
        document.getElementById('filterProduct').value = '';
        document.getElementById('filterQuestion').value = '';
        document.getElementById('filterAnswer').value = '';
        document.getElementById('filterTag').value = '';
        document.getElementById('filterAuthor').value = '';
        document.getElementById('filterDateFrom').value = '';
        document.getElementById('filterDateTo').value = '';
        syncFilters();
    }

    // 弹窗逻辑
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const editIdField = document.getElementById('editId');
    const questionInput = document.getElementById('questionInput');
    const answerInput = document.getElementById('answerInput');
    const categorySelect = document.getElementById('categorySelect');
    const bizTypeSelect = document.getElementById('bizTypeSelect');
    const productsGroup = document.getElementById('productsGroup');
    const productsInput = document.getElementById('productsInput');
    const tagsGroup = document.getElementById('tagsGroup');
    const tagsInput = document.getElementById('tagsInput');

    function toggleDynamicFields() {
        const biz = bizTypeSelect.value;
        if (biz === 'sales') {
            productsGroup.style.display = 'block';
            tagsGroup.style.display = 'none';
        } else if (biz === 'marketing') {
            productsGroup.style.display = 'none';
            tagsGroup.style.display = 'block';
        } else {
            productsGroup.style.display = 'none';
            tagsGroup.style.display = 'none';
        }
    }
    bizTypeSelect.addEventListener('change', toggleDynamicFields);

    function openModalNew() {
        modalTitle.innerText = '新建问答';
        editIdField.value = '';
        questionInput.value = '';
        answerInput.value = '';
        categorySelect.value = 'common';
        bizTypeSelect.value = 'sales';
        productsInput.value = '';
        tagsInput.value = '';
        toggleDynamicFields();
        modal.classList.add('active');
    }

    function openEditModal(id) {
        const item = knowledgeBase.find(i => i.id === id);
        if (!item) return;
        modalTitle.innerText = '编辑问答';
        editIdField.value = item.id;
        questionInput.value = item.q;
        answerInput.value = item.a;
        categorySelect.value = item.category;
        bizTypeSelect.value = item.bizType;
        toggleDynamicFields();
        if (item.bizType === 'sales') {
            productsInput.value = arrayToCommaString(item.products || []);
        } else if (item.bizType === 'marketing') {
            tagsInput.value = arrayToCommaString(item.tags || []);
        } else {
            productsInput.value = '';
            tagsInput.value = '';
        }
        modal.classList.add('active');
    }

    function closeModal() { modal.classList.remove('active'); }

    function saveModal() {
        const q = questionInput.value.trim();
        const a = answerInput.value.trim();
        if (!q || !a) { showToast('请完整填写问题和答案', true); return; }
        const id = editIdField.value ? parseInt(editIdField.value) : null;
        const category = categorySelect.value;
        const bizType = bizTypeSelect.value;
        let tagsArray = [];
        let productsArray = [];
        if (bizType === 'marketing') {
            tagsArray = parseCommaList(tagsInput.value);
            if (tagsArray.length === 0) tagsArray = ['通用'];
        } else if (bizType === 'sales') {
            productsArray = parseCommaList(productsInput.value);
            if (productsArray.length === 0) {
                showToast('销售专区问答必须填写关联商品（至少一个）', true);
                return;
            }
        }
        addOrUpdate({ id, q, a, category, bizType, tagsArray, productsArray });
        closeModal();
    }

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMessage');
        toast.textContent = msg;
        toast.style.background = isError ? '#ef4444' : '#111827';
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }

    // 导航事件
    function bindNavEvents() {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                const type = item.dataset.type;
                if (type === 'biz') {
                    currentBiz = item.dataset.value;
                    currentPage = 1;
                    renderAll();
                }
            });
        });
    }

    // 监听所有筛选输入变化
    function bindFilterEvents() {
        const filterInputs = ['filterProduct', 'filterQuestion', 'filterAnswer', 'filterTag', 'filterAuthor', 'filterDateFrom', 'filterDateTo'];
        filterInputs.forEach(id => {
            document.getElementById(id).addEventListener('input', syncFilters);
            document.getElementById(id).addEventListener('change', syncFilters);
        });
        document.getElementById('clearFiltersBtn').addEventListener('click', resetFilters);
    }

    function init() {
        loadData();
        bindNavEvents();
        bindFilterEvents();
        document.getElementById('createBtn').addEventListener('click', openModalNew);
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
        document.getElementById('saveBtn').addEventListener('click', saveModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
        renderAll();
    }
    init();
</script>
</body>
</html>
